<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обращения - Mini CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Mini CRM</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/customers}">Клиенты</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/appeals}">Обращения</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Обращения</h2>
        <a th:href="@{/appeals/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Новое обращение
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>
                    <a class="text-white text-decoration-none"
                       th:href="@{/appeals(page=${appealPage.number},size=${appealPage.size},sortBy='id',sortDir=${sortBy == 'id' ? reverseSortDir : 'asc'})}">
                        ID
                    </a>
                </th>
                <th>
                    <a class="text-white text-decoration-none"
                       th:href="@{/appeals(page=${appealPage.number},size=${appealPage.size},sortBy='subject',sortDir=${sortBy == 'subject' ? reverseSortDir : 'asc'})}">
                        Тема
                    </a>
                </th>
                <th>Клиент</th>
                <th>Статус</th>
                <th>
                    <a class="text-white text-decoration-none"
                       th:href="@{/appeals(page=${appealPage.number},size=${appealPage.size},sortBy='createdAt',sortDir=${sortBy == 'createdAt' ? reverseSortDir : 'asc'})}">
                        Создано
                    </a>
                </th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${appealPage.empty}">
                <td colspan="6" class="text-center text-muted py-4">
                    <i class="bi bi-inbox"></i> Нет обращений
                </td>
            </tr>
            <tr th:each="appeal : ${appealPage.content}">
                <td th:text="${appeal.id}">1</td>
                <td th:text="${appeal.subject}">Вопрос по услуге</td>
                <td>
                    <a th:href="@{/customers/edit/{id}(id=${appeal.customerId})}"
                       class="text-decoration-none">
                        Клиент #<span th:text="${appeal.customerId}"></span>
                    </a>
                </td>
                <td>
                    <span th:if="${appeal.status.name() == 'NEW'}" class="badge bg-primary">NEW</span>
                    <span th:if="${appeal.status.name() == 'IN_PROGRESS'}" class="badge bg-warning text-dark">IN_PROGRESS</span>
                    <span th:if="${appeal.status.name() == 'CLOSED'}" class="badge bg-success">CLOSED</span>
                    <span th:if="${appeal.status.name() == 'CANCELLED'}" class="badge bg-secondary">CANCELLED</span>
                </td>
                <td th:text="${#temporals.format(appeal.createdAt, 'dd.MM.yyyy HH:mm')}">-</td>
                <td>
                    <a th:href="@{/appeals/edit/{id}(id=${appeal.id})}"
                       class="btn btn-sm btn-warning me-1"
                       title="Редактировать">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form th:action="@{/appeals/delete/{id}(id=${appeal.id})}" method="post" class="d-inline">
                        <button type="submit"
                                class="btn btn-sm btn-danger"
                                title="Удалить"
                                onclick="return confirm('Удалить обращение?')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${appealPage.totalPages > 1}" class="mt-3">
        <ul class="pagination">
            <li class="page-item" th:classappend="${appealPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/appeals(page=${appealPage.number - 1},size=${appealPage.size},sortBy=${sortBy},sortDir=${sortDir})}">
                    Назад
                </a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="'Страница ' + (${appealPage.number + 1}) + ' из ' + ${appealPage.totalPages}"></span>
            </li>
            <li class="page-item" th:classappend="${appealPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/appeals(page=${appealPage.number + 1},size=${appealPage.size},sortBy=${sortBy},sortDir=${sortDir})}">
                    Вперёд
                </a>
            </li>
        </ul>
    </nav>

    <div class="mt-3">
        <a th:href="@{/}" class="btn btn-secondary">На главную</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
