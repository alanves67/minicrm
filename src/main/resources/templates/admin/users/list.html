<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи - Mini CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/warm-soft.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Mini CRM</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/customers}">Клиенты</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/appeals}">Обращения</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/users}">Пользователи</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Пользователи</h2>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">
            <i class="bi bi-person-plus"></i> Добавить пользователя
        </a>
    </div>

    <div th:if="${param.created}" class="alert alert-success">Пользователь создан.</div>
    <div th:if="${param.updated}" class="alert alert-success">Пользователь обновлен.</div>
    <div th:if="${param.deleted}" class="alert alert-info">Пользователь удален.</div>
    <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}">Ошибка</div>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Логин</th>
                <th>Роль</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="5" class="text-center">Пользователей нет</td>
            </tr>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.username}">admin</td>
                <td th:text="${user.role}">ADMIN</td>
                <td>
                    <span class="badge bg-success" th:if="${user.enabled}">ACTIVE</span>
                    <span class="badge bg-secondary" th:unless="${user.enabled}">DISABLED</span>
                </td>
                <td>
                    <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-warning me-1">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить пользователя?')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
