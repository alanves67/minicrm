<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editMode} ? 'Редактировать пользователя - Mini CRM' : 'Новый пользователь - Mini CRM'">Пользователь</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/warm-soft.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Mini CRM</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/customers}">Клиенты</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/appeals}">Обращения</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/users}">Пользователи</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header">
                    <h3 th:text="${editMode} ? 'Редактирование пользователя' : 'Новый пользователь'">Пользователь</h3>
                </div>
                <div class="card-body">
                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                        <ul class="mb-0">
                            <li th:each="err : ${#fields.globalErrors()}" th:text="${err.defaultMessage}">Ошибка</li>
                        </ul>
                    </div>

                    <form th:action="${editMode} ? @{/admin/users/update/{id}(id=${userForm.id})} : @{/admin/users}"
                          method="post"
                          th:object="${userForm}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="username" class="form-label">Логин *</label>
                            <input id="username" type="text" class="form-control" th:field="*{username}">
                            <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль *</label>
                            <input id="password" type="password" class="form-control" th:field="*{password}">
                            <div class="form-text">Минимум 6 символов. При редактировании задайте новый пароль.</div>
                            <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="role" class="form-label">Роль *</label>
                            <select id="role" class="form-select" th:field="*{role}">
                                <option th:each="role : ${roles}" th:value="${role}" th:text="${role}">USER</option>
                            </select>
                            <div class="text-danger" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                        </div>

                        <div class="form-check mb-3">
                            <input id="enabled" type="checkbox" class="form-check-input" th:field="*{enabled}">
                            <label for="enabled" class="form-check-label">Активный пользователь</label>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Сохранить
                            </button>
                            <a th:href="@{/admin/users}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
