<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Клиенты - Mini CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Mini CRM</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/customers}">Клиенты</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/appeals}">Обращения</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Клиенты</h2>
        <a th:href="@{/customers/new}" class="btn btn-primary">Добавить клиента</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead class="table-dark">
            <tr>
                <th>
                    <a class="text-white text-decoration-none"
                       th:href="@{/customers(page=${customerPage.number},size=${customerPage.size},sortBy='id',sortDir=${sortBy == 'id' ? reverseSortDir : 'asc'})}">
                        ID
                    </a>
                </th>
                <th>
                    <a class="text-white text-decoration-none"
                       th:href="@{/customers(page=${customerPage.number},size=${customerPage.size},sortBy='firstName',sortDir=${sortBy == 'firstName' ? reverseSortDir : 'asc'})}">
                        Имя
                    </a>
                </th>
                <th>Фамилия</th><th>Email</th><th>Телефон</th><th>Компания</th><th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${customerPage.empty}">
                <td colspan="7" class="text-center">Нет клиентов</td>
            </tr>
            <tr th:each="customer : ${customerPage.content}">
                <td th:text="${customer.id}">1</td>
                <td th:text="${customer.firstName}">Иван</td>
                <td th:text="${customer.lastName}">Петров</td>
                <td th:text="${customer.email}">ivan@example.com</td>
                <td th:text="${customer.phone != null ? customer.phone : '-'}">-</td>
                <td th:text="${customer.company != null ? customer.company : '-'}">-</td>
                <td>
                    <a th:href="@{/customers/edit/{id}(id=${customer.id})}" class="btn btn-sm btn-warning">Редактировать</a>
                    <form th:action="@{/customers/delete/{id}(id=${customer.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">Удалить</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${customerPage.totalPages > 1}" class="mt-3">
        <ul class="pagination">
            <li class="page-item" th:classappend="${customerPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/customers(page=${customerPage.number - 1},size=${customerPage.size},sortBy=${sortBy},sortDir=${sortDir})}">
                    Назад
                </a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="'Страница ' + (${customerPage.number + 1}) + ' из ' + ${customerPage.totalPages}"></span>
            </li>
            <li class="page-item" th:classappend="${customerPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/customers(page=${customerPage.number + 1},size=${customerPage.size},sortBy=${sortBy},sortDir=${sortDir})}">
                    Вперёд
                </a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
