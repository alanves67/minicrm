<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:if="${customer.id}" th:text="'Редактировать клиента - ' + ${customer.firstName} + ' ' + ${customer.lastName}">Редактирование клиента</title>
    <title th:unless="${customer.id}">Новый клиент - Mini CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Mini CRM</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/customers}">Клиенты</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/appeals}">Обращения</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 th:if="${customer.id}" th:text="'Редактировать клиента: ' + ${customer.firstName} + ' ' + ${customer.lastName}">Редактирование клиента</h3>
                    <h3 th:unless="${customer.id}">Новый клиент</h3>
                </div>
                <div class="card-body">
                    <form th:action="${customer.id} ? @{/customers/update/{id}(id=${customer.id})} : @{/customers}"
                          method="post"
                          th:object="${customer}">

                        <div class="mb-3">
                            <label for="firstName" class="form-label">Имя *</label>
                            <input type="text"
                                   class="form-control"
                                   id="firstName"
                                   th:field="*{firstName}"
                                   placeholder="Введите имя">
                            <div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="lastName" class="form-label">Фамилия *</label>
                            <input type="text"
                                   class="form-control"
                                   id="lastName"
                                   th:field="*{lastName}"
                                   placeholder="Введите фамилию">
                            <div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email"
                                   class="form-control"
                                   id="email"
                                   th:field="*{email}"
                                   placeholder="example@mail.com">
                            <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Телефон</label>
                            <input type="text"
                                   class="form-control"
                                   id="phone"
                                   th:field="*{phone}"
                                   placeholder="+7 (999) 123-45-67">
                            <div class="form-text">Необязательное поле</div>
                        </div>

                        <div class="mb-3">
                            <label for="company" class="form-label">Компания</label>
                            <input type="text"
                                   class="form-control"
                                   id="company"
                                   th:field="*{company}"
                                   placeholder="Название компании">
                            <div class="form-text">Необязательное поле</div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Сохранить
                            </button>
                            <a th:href="@{/customers}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
